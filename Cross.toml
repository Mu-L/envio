[target.x86_64-unknown-linux-gnu]
pre-build = ["export DEBIAN_FRONTEND=noninteractive && apt-get update -y && apt-get install -y libdbus-1-dev"]

[target.aarch64-unknown-linux-gnu]
pre-build = ["dpkg --add-architecture arm64 && export DEBIAN_FRONTEND=noninteractive && apt-get update -y && apt-get install -y libdbus-1-dev:arm64"]

[target.i686-unknown-linux-gnu]
pre-build = ["dpkg --add-architecture i386 && export DEBIAN_FRONTEND=noninteractive && apt-get update -y && apt-get install -y libdbus-1-dev:i386"]